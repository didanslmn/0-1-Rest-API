

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: product_store_api
    ports:
      - "8080:8080"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3

